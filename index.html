<!DOCTYPE html>
<html lang="uk">
<head>
  <title>RDO Plants Map</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔽 ДОДАНО FAVICON -->
  <link rel="icon" type="image/png" href="./favicon.png">

  <link rel="stylesheet" href="assets/css/leaflet.css">
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    #plants-panel {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      width: 360px;
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      background: rgba(22, 17, 13, 0.96);
      border: 1px solid rgba(214, 170, 91, 0.75);
      border-radius: 14px;
      padding: 14px;
      color: #f4e1b8;
      box-shadow: 0 10px 35px rgba(0,0,0,0.65);
      font-family: Arial, sans-serif;
    }

    .panel-header {
      position: relative;
      margin-bottom: 14px;
    }

    #plants-panel h2 {
      margin: 0;
      font-size: 25px;
      text-align: center;
      color: #ffd27a;
      font-weight: bold;
    }

    .arrow-toggle {
      background: none;
      border: none;
      color: #ffd27a;
      cursor: pointer;
      font-weight: bold;
      font-size: 22px;
      line-height: 1;
      padding: 0;
    }

    #toggle-plants-panel {
      position: absolute;
      right: 48px;
      top: 3px;
    }

    .arrow-toggle.open {
      transform: rotate(180deg);
    }

    #plants-panel.panel-collapsed {
      max-height: none;
      overflow: hidden;
    }

    #plants-panel.panel-collapsed .panel-content {
      display: none;
    }

    #recipes-section {
      display: none;
    }

    #recipes-section.open {
      display: block;
    }

    .panel-section-title {
      margin: 14px 0 8px;
      padding-bottom: 6px;
      font-size: 13px;
      color: #ffd27a;
      border-bottom: 1px solid rgba(255, 210, 122, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #plants-search {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: linear-gradient(180deg, #211810, #120d09);
      border: 1px solid rgba(214, 170, 91, 0.8);
      border-radius: 9px;
      color: #f4e1b8;
      font-size: 14px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 2px 8px rgba(0,0,0,0.35);
    }

    #plants-search::placeholder {
      color: rgba(244, 225, 184, 0.55);
    }

    #plants-search:focus {
      border-color: #ffd27a;
      box-shadow: 0 0 0 2px rgba(255, 210, 122, 0.16);
    }

    .plants-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .plants-actions button,
    #reset-collected,
    .recipe-option {
      background: linear-gradient(180deg, #9b672f, #5c3717);
      color: #fff3d0;
      border: 1px solid rgba(214, 170, 91, 0.85);
      border-radius: 9px;
      padding: 9px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 3px 10px rgba(0,0,0,0.35);
    }

    .plants-actions button:hover,
    #reset-collected:hover,
    .recipe-option:hover,
    .arrow-toggle:hover {
      filter: brightness(1.15);
    }

    #reset-collected {
      width: 100%;
      margin-bottom: 12px;
      background: linear-gradient(180deg, #6c8f31, #3f5c1b);
    }

    #recipes-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin-bottom: 10px;
    }

    .recipe-option {
      text-align: left;
      background: linear-gradient(180deg, #30251b, #17100b);
    }

    .recipe-option.active {
      border-color: #ffd27a;
      color: #ffd27a;
      background: linear-gradient(180deg, #5a3f1e, #22150a);
    }

    #plants-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .plant-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 9px;
      border: 1px solid rgba(185, 138, 66, 0.42);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(54, 41, 30, 0.96), rgba(31, 23, 17, 0.96));
      cursor: pointer;
      user-select: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 2px 8px rgba(0,0,0,0.28);
    }

    .plant-option:hover {
      border-color: rgba(255, 210, 122, 0.85);
      background: linear-gradient(180deg, rgba(67, 51, 37, 0.98), rgba(41, 30, 22, 0.98));
    }

    .plant-option img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .plant-option input {
      transform: scale(1.1);
      flex: 0 0 auto;
      accent-color: #d6aa5b;
    }

    .plant-option span {
      font-size: 15px;
      line-height: 1.2;
      color: #f4e1b8;
      font-weight: bold;
    }

    .plant-option.disabled {
      opacity: 0.48;
      background: linear-gradient(180deg, rgba(39, 32, 26, 0.85), rgba(22, 18, 15, 0.85));
    }

    .plant-option.recipe-needed {
      border-color: #ffd27a;
      box-shadow: 0 0 0 1px rgba(255, 210, 122, 0.25), 0 3px 12px rgba(0,0,0,0.38);
    }

    .plant-popup h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .plant-popup button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border: none;
      border-radius: 5px;
      background: #5f7f2a;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .plant-popup button:hover {
      background: #739b31;
    }

    @media (max-width: 768px) {
      #plants-panel {
        width: calc(100vw - 24px);
        left: 12px;
        right: 12px;
        top: 12px;
        max-height: calc(100vh - 24px);
        padding: 12px;
      }

      #plants-panel h2 {
        font-size: 24px;
      }

      #toggle-plants-panel {
        right: 42px;
        top: 2px;
      }

      #plants-search {
        font-size: 16px;
        padding: 12px;
      }

      #reset-collected {
        font-size: 16px;
        padding: 12px;
      }

      .plants-actions button {
        font-size: 16px;
        padding: 12px 8px;
      }

      .recipe-option {
        font-size: 16px;
        padding: 12px;
      }

      .plant-option {
        padding: 9px;
        gap: 8px;
      }

      .plant-option img {
        width: 32px;
        height: 32px;
      }

      .plant-option span {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div id="plants-panel">
    <div class="panel-header">
      <h2>Рослини</h2>
      <button id="toggle-plants-panel" class="arrow-toggle">▲</button>
    </div>

    <div class="panel-content">
      <input id="plants-search" type="text" placeholder="Пошук рослин...">

      <button id="reset-collected">Оновити збір рослин</button>

      <div class="plants-actions">
        <button id="select-all-plants">Вибрати всі</button>
        <button id="clear-all-plants">Сховати всі</button>
      </div>

      <div class="panel-section-title">
        <span>Рецепти медика</span>
        <button id="toggle-recipes" class="arrow-toggle">▼</button>
      </div>

      <div id="recipes-section">
        <div id="recipes-list"></div>
      </div>

      <div class="panel-section-title">Усі рослини</div>
      <div id="plants-list"></div>
    </div>
  </div>

  <div id="map"></div>

  <script>
    var nocache = 1560;
  </script>

  <script src="assets/js/lib/bootstrap.min.js"></script>
  <script src="assets/js/lib/leaflet.js"></script>
  <script src="assets/js/lib/leaflet-zoomex.js"></script>
  <script src="assets/js/lib/oms.min.js"></script>
  <script src="assets/js/lib/rbush.js"></script>

  <script>
    var module = {};
  </script>

  <script src="assets/js/lib/leaflet.canvas-markers.js"></script>

  <script>
    module.exports(L);
  </script>

  <script src="assets/js/loader.js?v=1560"></script>
  <script src="assets/js/layers.js?v=1560"></script>
  <script src="assets/js/settings.js?v=1560"></script>
  <script src="assets/js/marker.js?v=1560"></script>
  <script src="assets/js/map.js?v=1560"></script>
  <script src="assets/js/language.js?v=1560"></script>
  <script src="assets/js/plants.js?v=1560"></script>
  <script src="assets/js/scripts.js?v=1560"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const panel = document.getElementById('plants-panel');
      const togglePanel = document.getElementById('toggle-plants-panel');
      const recipesSection = document.getElementById('recipes-section');
      const toggleRecipes = document.getElementById('toggle-recipes');

      togglePanel.addEventListener('click', function () {
        panel.classList.toggle('panel-collapsed');
        togglePanel.textContent = panel.classList.contains('panel-collapsed') ? '▼' : '▲';
      });

      toggleRecipes.addEventListener('click', function () {
        recipesSection.classList.toggle('open');
        toggleRecipes.textContent = recipesSection.classList.contains('open') ? '▲' : '▼';
      });
    });
  </script>
</body>
</html>
