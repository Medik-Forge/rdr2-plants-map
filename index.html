<!DOCTYPE html>
<html lang="uk">
<head>
  <title>RDO Plants Map</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="assets/css/leaflet.css">
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    #plants-panel {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      width: 350px;
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      background: rgba(29, 21, 15, 0.96);
      border: 2px solid #b98a42;
      border-radius: 10px;
      padding: 14px;
      color: #f4e1b8;
      box-shadow: 0 8px 28px rgba(0,0,0,0.55);
      font-family: Arial, sans-serif;
    }

    #plants-panel h2 {
      margin: 0 0 14px;
      font-size: 26px;
      text-align: center;
      color: #ffd27a;
      font-weight: bold;
    }

    .panel-section-title {
      margin: 14px 0 8px;
      padding-bottom: 5px;
      font-size: 15px;
      color: #ffd27a;
      border-bottom: 1px solid rgba(255, 210, 122, 0.35);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #plants-search {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(17, 12, 8, 0.98), rgba(39, 29, 20, 0.98));
      border: 1px solid #b98a42;
      border-radius: 7px;
      color: #f4e1b8;
      font-size: 14px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 2px 8px rgba(0,0,0,0.35);
    }

    #plants-search::placeholder {
      color: rgba(244, 225, 184, 0.58);
    }

    #plants-search:focus {
      border-color: #ffd27a;
      box-shadow: 0 0 0 2px rgba(255, 210, 122, 0.18);
    }

    .plants-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .plants-actions button,
    #reset-collected,
    .recipe-option {
      background: linear-gradient(180deg, #a56d2f, #744719);
      color: #fff3d0;
      border: 1px solid #d6aa5b;
      border-radius: 7px;
      padding: 9px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 2px 8px rgba(0,0,0,0.35);
    }

    .plants-actions button:hover,
    #reset-collected:hover,
    .recipe-option:hover {
      filter: brightness(1.12);
    }

    #reset-collected {
      width: 100%;
      margin-bottom: 12px;
      background: linear-gradient(180deg, #6f942f, #4f6e20);
    }

    #recipes-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin-bottom: 10px;
    }

    .recipe-option {
      text-align: left;
      background: linear-gradient(180deg, rgba(52, 43, 34, 0.98), rgba(30, 23, 17, 0.98));
    }

    .recipe-option.active {
      border-color: #ffd27a;
      color: #ffd27a;
      background: linear-gradient(180deg, rgba(92, 69, 35, 0.98), rgba(46, 32, 18, 0.98));
    }

    #plants-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .plant-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 9px;
      border: 1px solid rgba(185, 138, 66, 0.38);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(53, 40, 30, 0.95), rgba(36, 27, 20, 0.95));
      cursor: pointer;
      user-select: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 2px 5px rgba(0,0,0,0.22);
    }

    .plant-option:hover {
      border-color: rgba(255, 210, 122, 0.75);
      background: linear-gradient(180deg, rgba(65, 49, 36, 0.98), rgba(43, 32, 23, 0.98));
    }

    .plant-option img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .plant-option input {
      transform: scale(1.15);
      flex: 0 0 auto;
      accent-color: #d6aa5b;
    }

    .plant-option span {
      font-size: 15px;
      line-height: 1.2;
      color: #f4e1b8;
      font-weight: bold;
    }

    .plant-option.disabled {
      opacity: 0.46;
      background: linear-gradient(180deg, rgba(42, 34, 27, 0.78), rgba(27, 22, 17, 0.78));
    }

    .plant-option.recipe-needed {
      border-color: #ffd27a;
      box-shadow: 0 0 0 1px rgba(255, 210, 122, 0.25), 0 2px 8px rgba(0,0,0,0.35);
    }

    .plant-popup h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .plant-popup button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border: none;
      border-radius: 5px;
      background: #5f7f2a;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .plant-popup button:hover {
      background: #739b31;
    }
  </style>
</head>

<body>
  <div id="plants-panel">
    <h2>Рослини</h2>

    <input id="plants-search" type="text" placeholder="Пошук рослин...">

    <button id="reset-collected">Оновити збір рослин</button>

    <div class="plants-actions">
      <button id="select-all-plants">Вибрати всі</button>
      <button id="clear-all-plants">Сховати всі</button>
    </div>

    <div class="panel-section-title">Рецепти медика</div>
    <div id="recipes-list"></div>

    <div class="panel-section-title">Усі рослини</div>
    <div id="plants-list"></div>
  </div>

  <div id="map"></div>

  <script>
    var nocache = 1560;
  </script>

  <script src="assets/js/lib/bootstrap.min.js"></script>
  <script src="assets/js/lib/leaflet.js"></script>
  <script src="assets/js/lib/leaflet-zoomex.js"></script>
  <script src="assets/js/lib/oms.min.js"></script>

  <script src="assets/js/plants.js?v=1560"></script>
  <script src="assets/js/scripts.js?v=1560"></script>
</body>
</html>
